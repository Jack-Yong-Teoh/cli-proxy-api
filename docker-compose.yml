services:
  cpa:
    image: ${CPA_IMAGE:-eceasy/cli-proxy-api:latest}
    pull_policy: always
    build:
      context: ./cpa
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cpa
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CPA_CONFIG_PATH:-./cpa/config.yaml}:/CLIProxyAPI/config.yaml
      - ${CPA_AUTH_PATH:-./cpa/auths}:/root/.cli-proxy-api
      - ${CPA_LOG_PATH:-./cpa/logs}:/CLIProxyAPI/logs
    restart: unless-stopped
    networks:
      - cpa_net

